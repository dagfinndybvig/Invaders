name: Deploy spark-app to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "spark-app/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload spark-app artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: spark-app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
