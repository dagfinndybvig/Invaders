<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Invaders - Play Now!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='game.css') }}">
    <meta name="description" content="Play Space Invaders with mobile touch controls! Classic arcade game optimized for all devices.">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div class="game-container">
        <h1>Space Invaders</h1>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <p id="controlText">Arrows move, hold SPACE auto-fire, C charge-shot, S toggle auto-play.</p>
        </div>
        <div class="audio-controls" id="audioControls">
            <button id="audioStartBtn" class="audio-btn">Enable Audio</button>
            <button id="audioMuteBtn" class="audio-btn">Mute: Off</button>
            <label class="audio-slider-label" for="musicVolume">Music</label>
            <input id="musicVolume" class="audio-slider" type="range" min="0" max="100" value="38">
            <label class="audio-slider-label" for="sfxVolume">SFX</label>
            <input id="sfxVolume" class="audio-slider" type="range" min="0" max="100" value="72">
        </div>
        
        <!-- Touch Controls for Mobile -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-buttons">
                <div class="touch-btn" id="leftBtn">←</div>
                <div class="touch-btn touch-shoot" id="shootBtn">🚀</div>
                <div class="touch-btn" id="rightBtn">→</div>
            </div>
            <div class="touch-autoplay">
                <div class="autoplay-btn" id="autoplayBtn">S</div>
            </div>
        </div>
    </div>
    <script type="module" src="{{ url_for('static', filename='js/space.js') }}"></script>
</body>
</html>
